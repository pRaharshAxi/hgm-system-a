services:
  postgres:
    image: postgres:16.2-alpine
    container_name: hgm_postgres
    environment:
      POSTGRES_USER: hgm_user
      POSTGRES_PASSWORD: hgm_password
      POSTGRES_DB: hgm_system_a
    ports:
      - "5435:5432" #Map port 5435 on your Windows machine to the internal port 5432 inside the Docker container.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hgm_user -d hgm_system_a"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: hgm_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:7.2.4-alpine
    container_name: hgm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: hgm_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  minio_data: